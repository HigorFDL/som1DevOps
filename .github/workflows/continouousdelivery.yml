name: Continuous Delivery - Teste

on:
  push:
    branches:
      - main

jobs:
  deliver:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Gerando artefato
        uses: actions/upload-artifact@v3
        with:
          name: projeto
          path: |
            **/*.py
            README.md

  deploy:
    runs-on: ubuntu-latest
    needs: deliver
    steps:
      - name: Baixar artefato
        uses: actions/download-artifact@v3
        with:
          name: projeto

      - name: Mostrar arquivos
        run: ls -R