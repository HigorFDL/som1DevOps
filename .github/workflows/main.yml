name: CI + CD Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Teste simples
        run: python -c "print('CI funcionando')"

  cd:
    name: Continuous Delivery
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Gerar artefato
        uses: actions/upload-artifact@v4
        with:
          name: projeto
          path: |
            **/*.py
            README.md

      - name: Simular deploy
        run: echo "Deploy realizado com sucesso 🚀"